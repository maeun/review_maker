name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # 디버그: Node/npm 버전과 설정 확인
      - name: Debug Node/npm environment
        run: |
          node -v
          npm -v
          npm config list

      # 1) 캐시된 node_modules가 없을 경우에도 빠르게 실패하거나 힌트 로그를 보려면 --verbose를 붙여 봅니다.
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false --verbose

      # 2) (선택) install 이후 캐시 상태 확인
      - name: Verify npm cache
        run: npm cache verify

      # 3) 빌드
      - name: Build (verbose)
        run: npm run build --verbose

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_REVIEW_MAKER_NVR }}
          channelId: live
          projectId: review-maker-nvr
